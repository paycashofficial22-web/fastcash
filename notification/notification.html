 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Money Logic</title>
    <link rel="stylesheet" href="notification.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Choti si extra styling taake pichle messages achay lagain */
        .msg-list { display: flex; flex-direction: column; gap: 15px; }
        .msg-card { position: relative; overflow: hidden; }
        .time-stamp { font-size: 0.75rem; opacity: 0.7; display: block; margin-top: 8px; }
        .no-msg { text-align: center; color: gray; padding: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="window.location.href='../dashboard/dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <h2>Notifications</h2>
    </div>

    <div class="container">
        <div class="section-title"><i class="fas fa-globe"></i> GLOBAL UPDATES (Last 7 Days)</div>
        <div id="globalList" class="msg-list">
            <p class="no-msg">Checking for updates...</p>
        </div>

        <div class="section-title" style="margin-top: 30px;"><i class="fas fa-user-shield"></i> PERSONAL MESSAGES</div>
        <div id="personalList" class="msg-list">
            <p class="no-msg">No private messages found.</p>
        </div>
    </div>

    <script type="module" src="notification.logic.js"></script>
</body>
</html>
