 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn PKR 40 Per Friend | Fast Cash</title>
    <link rel="stylesheet" href="refferal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <i class="fa-solid fa-chevron-left" onclick="window.history.back()"></i>
            <h2>Referral Dashboard</h2>
        </div>

        <div class="card stats">
            <div class="row">
                <span>Paid Referrals</span>
                <b id="refCountText">0 / 4</b>
            </div>
            <div class="bar-container">
                <div id="referralProgress" class="bar-fill"></div>
            </div>
            <p class="status-msg">Get 4 paid friends to unlock withdrawal.</p>
        </div>

        <div class="card earnings">
            <p>Your Referral Bonus</p>
            <h1 id="bonusAmount">PKR 0.00</h1>
        </div>

        <div class="link-section">
            <label>Your Unique Invite Link</label>
            <div class="copy-box">
                <input type="text" id="referralLinkInput" readonly value="Loading...">
                <button onclick="copyLink()">Copy</button>
            </div>
        </div>

        <div class="social-share">
            <button class="s-btn wa" onclick="share('wa')"><i class="fa-brands fa-whatsapp"></i></button>
            <button class="s-btn fb" onclick="share('fb')"><i class="fa-brands fa-facebook-f"></i></button>
            <button class="s-btn ig" onclick="share('ig')"><i class="fa-brands fa-instagram"></i></button>
        </div>

        <button id="withdrawLockedBtn" class="btn-main locked" disabled>
            <i class="fa-solid fa-lock"></i> Withdraw Locked
        </button>
    </div>

    <script type="module" src="refferal.logic.js"></script>
</body>
</html>
