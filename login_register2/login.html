 <!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-card">
        <i class="fas fa-fingerprint logo-icon"></i>
        <h2 style="color:white">Login</h2>
        <form id="loginForm">
            <div class="input-group"><i class="fas fa-phone"></i><input type="number" id="logPhone" placeholder="Phone Number" required></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="logPass" placeholder="Password" required></div>
            <button type="submit" class="auth-btn">SIGN IN</button>
        </form>
        <p style="color:gray; margin-top:20px;">New user? <a href="register.html" style="color:var(--gold)">Register</a></p>
    </div>
    <script type="module" src="logic.js"></script>
</body>
</html>
