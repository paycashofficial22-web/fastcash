 <!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-card">
        <i class="fas fa-user-plus logo-icon"></i>
        <h2 style="color:white">Register</h2>
        
        <div id="refTag" class="ref-badge">
            <i class="fas fa-link"></i> Referred By: <span id="refIdShow"></span>
        </div>

        <form id="registerForm">
    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="regName" placeholder="Full Name" required>
    </div>

    <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="number" id="regPhone" placeholder="Phone Number" required>
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="regPass" placeholder="Password" required>
    </div>

    <div class="input-group">
        <i class="fas fa-user-friends"></i>
        <input type="text" id="referralInput" placeholder="Referral ID (Optional)" readonly style="background: rgba(255,204,0,0.05); color: #ffcc00; font-weight: bold;">
    </div>

    <button type="submit" class="auth-btn">CREATE ACCOUNT</button>
</form>
        <p style="color:gray; margin-top:20px;">Joined already? <a href="login.html" style="color:var(--gold)">Login Here</a></p>
    </div>
    <script type="module" src="logic.js"></script>
</body>
</html>
