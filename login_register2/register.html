 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Money Logic</title>
    <link rel="stylesheet" href="auth.css"> </head>
<body>
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join the future of earning</p>
        <form id="registerForm">
            <input type="text" id="regName" placeholder="Full Name" required>
            <input type="tel" id="regPhone" placeholder="Phone Number" required>
            <input type="password" id="regPass" placeholder="Create Password" required>
            <input type="text" id="refCode" placeholder="Referral Code (Optional)">
            <button type="submit" class="btn-auth">Register Now</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script type="module" src="logic.js"></script>
</body>
</html>
