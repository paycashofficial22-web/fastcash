 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Pro Earning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="top-bar">
        <i class="fas fa-th-large menu-btn" id="menuToggle" onclick="toggleSidebar()"></i>
        <div style="font-weight:bold; letter-spacing:1px; color:var(--primary-blue);">FAST CASH <span style="color:white;">UI</span></div>
        <i class="fas fa-bell" style="color:var(--primary-blue); font-size:20px;"></i>
    </div>

    <div class="sidebar" id="mySidebar">
        <div style="text-align:center; padding:20px;">
            <div style="position:relative; display:inline-block;">
                <i class="fas fa-user-circle" style="font-size:70px; color:var(--primary-blue);"></i>
                <i class="fas fa-camera edit-icon" onclick="editName()" style="position:absolute; bottom:0; right:0; background:var(--primary-blue); color:white; padding:6px; border-radius:50%; font-size:10px; cursor:pointer; border:2px solid #081225;"></i>
            </div>
            <h3 id="sideName" style="margin:10px 0 0; font-size:18px;">Loading...</h3>
            <p id="sidePhone" style="color:#6366f1; font-size:12px; margin:5px 0;"></p>
        </div>
        
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i> Deposit Money</a>
            <a href="withdraw.html" class="nav-item"><i class="fas fa-receipt"></i> Withdraw</a>
            <a href="referral.html" class="nav-item"><i class="fas fa-share-alt"></i> Refer & Earn</a>
            <a href="support.html" class="nav-item"><i class="fas fa-headset"></i> Support</a>
            <a href="#" class="nav-item" id="logoutBtn" style="color:#ff4d4d; margin-top:20px;"><i class="fas fa-power-off"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="balance-card">
            <p style="font-size:12px; opacity:0.8; text-transform:uppercase; letter-spacing:1px;">Available Funds</p>
            <h1 id="totalBalance">PKR 0.00</h1>
            <div style="margin-top:15px;">
<button onclick="openDeposit()" style="background: white; color: var(--primary); border: none; padding: 10px 25px; border-radius: 30px; font-weight: bold; cursor: pointer;">
    Add Cash
</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <i class="fas fa-users"></i>
                <h2 id="refCount">0/4</h2>
                <p style="font-size:11px; opacity:0.6;">Referrals</p>
            </div>
            <div class="stat-box">
                <i class="fas fa-gift"></i>
                <h2 id="refEarning">0</h2>
                <p style="font-size:11px; opacity:0.6;">Bonuses</p>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard-logic.js"></script>

    <script type="module" src="neural-core.js"></script>


<div id="depositContainer" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); display:none; justify-content:center; align-items:center; z-index:9999;">
    <div style="width:95%; max-width:400px; height:80vh; background:#0a0e1a; border-radius:30px; overflow:hidden; position:relative; border:1px solid rgba(255,255,255,0.1);">
        <i class="fas fa-times-circle" onclick="closeDeposit()" style="position:absolute; top:15px; right:20px; font-size:25px; color:#ff4d4d; z-index:10000; cursor:pointer;"></i>
        
        <iframe src="../deposit/deposit.html" style="width:100%; height:100%; border:none;" id="depositFrame"></iframe>
    </div>
</div>



</body>
</html>
