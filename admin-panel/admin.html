 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Logic | Ultimate Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <section class="stats-grid">
            <div class="stat-card"><h3>Total Deposit Balance</h3><p id="totalDeposits">Rs. 0</p></div>
            <div class="stat-card"><h3>Total Withdrawal Req</h3><p id="totalWithdrawals">0</p></div>
            <div class="stat-card"><h3>Total Paid Users</h3><p id="totalPaidUsers">0</p></div>
            <div class="stat-card"><h3>Total Members</h3><p id="totalMembers">0</p></div>
            <div class="stat-card"><h3>Active Locks</h3><p id="activeLocks">0</p></div>
            <div class="stat-card"><h3>System Status</h3><p style="color: #22c55e;">Online</p></div>
        </section>

        <section class="notification-panel">
            <div class="panel-header"><h3><i class="fas fa-bullhorn"></i> Global Announcement</h3></div>
            <div class="panel-body">
                <textarea id="globalMsg" placeholder="Type message for all users..."></textarea>
                <button onclick="sendGlobalNotification()" class="btn-send-all">Send to All Users</button>
            </div>
        </section>

        <div class="controls-row">
            <input type="text" id="userSearch" placeholder="Search by name, phone or UID...">
            <select id="statusFilter">
                <option value="all">All Users</option>
                <option value="paid">Paid Only</option>
                <option value="unpaid">Unpaid Only</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Balance</th>
                        <th>Ref Count</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-user-edit"></i> Edit User Profile</h3>
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label>Full Name</label><input type="text" id="editName">
                <label>Balance (PKR)</label><input type="number" id="editBalance">
                <label>Referral Count</label><input type="number" id="editRefCount">
                <label>Direct Message to User</label>
                <textarea id="userPersonalMsg" placeholder="Send private message to this user..."></textarea>
            </div>
            <div class="modal-btns">
                <button onclick="saveUserChanges()" class="btn-confirm">Save Changes</button>
                <button onclick="closeModal()" class="btn-close">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.logic.js"></script>
</body>
</html>
