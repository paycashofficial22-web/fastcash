 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayCash Official Admin Console</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="https://via.placeholder.com/40" alt="Logo">
                <span>PayCash Admin</span>
            </div>
            <ul class="nav-links">
                <li onclick="loadView('dashboard')" class="active"><i class="fas fa-home"></i> Dashboard</li>
                <li onclick="loadView('users')"><i class="fas fa-users"></i> User Management</li>
                <li onclick="loadView('deposits')"><i class="fas fa-arrow-down"></i> Deposit Requests</li>
                <li onclick="loadView('withdrawals')"><i class="fas fa-arrow-up"></i> Withdraw Requests</li>
                <li onclick="loadView('settings')"><i class="fas fa-cog"></i> System Settings</li>
            </ul>
        </nav>

        <main class="content-body">
            <div class="stats-grid">
                <div class="stat-card blue" onclick="loadView('users')">
                    <div class="icon-box"><i class="fas fa-user-friends"></i></div>
                    <div class="info"><h3>Total Users</h3><h2 id="countUsers">0</h2></div>
                </div>
                <div class="stat-card green" onclick="loadView('deposits')">
                    <div class="icon-box"><i class="fas fa-hand-holding-usd"></i></div>
                    <div class="info"><h3>Deposit Req</h3><h2 id="countDeposits">0</h2></div>
                </div>
                <div class="stat-card orange" onclick="loadView('withdrawals')">
                    <div class="icon-box"><i class="fas fa-money-check-alt"></i></div>
                    <div class="info"><h3>Withdraw Req</h3><h2 id="countWithdraws">0</h2></div>
                </div>
                <div class="stat-card purple">
                    <div class="icon-box"><i class="fas fa-wallet"></i></div>
                    <div class="info"><h3>Total Funds</h3><h2 id="statFunds">Rs. 0</h2></div>
                </div>
                <div class="stat-card red">
                    <div class="icon-box"><i class="fas fa-gift"></i></div>
                    <div class="info"><h3>Ref Bonuses</h3><h2 id="statBonuses">Rs. 0</h2></div>
                </div>
                <div class="stat-card cyan">
                    <div class="icon-box"><i class="fas fa-comment-dots"></i></div>
                    <div class="info"><h3>Messages</h3><h2 id="countMsgs">0</h2></div>
                </div>
            </div>

            <div class="data-section">
                <div class="table-header">
                    <h2 id="viewTitle">Live User Management</h2>
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="adminSearch" placeholder="Search by Name, TRX ID, or Phone..." onkeyup="filterData()">
                    </div>
                </div>
                <div class="responsive-table">
                    <table>
                        <thead id="tHead"></thead>
                        <tbody id="tBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Update User Balance</h3>
            <input type="number" id="newBalanceField" placeholder="Enter New Balance">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" id="saveBalanceBtn">Update Now</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.logic.js"></script>
</body>
</html>
